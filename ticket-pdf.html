<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<style>

body{
    font-family:Arial,sans-serif;
    padding:30px;
}

.encabezado{

    background:#1e3a8a;
    color:white;

    text-align:center;

    padding:20px;

    border-radius:10px;

    margin-bottom:20px;
}

.logo{

    width:120px;
    margin-bottom:10px;
}

.info{

    margin-bottom:20px;
}

table{

    width:100%;
    border-collapse:collapse;
}

th,
td{

    border:1px solid #ccc;
    padding:10px;
}

th{

    background:#1e3a8a;
    color:white;
}

tr:nth-child(even){

    background:#f5f5f5;
}

.total{

    margin-top:20px;
    text-align:right;

    font-size:22px;
    font-weight:bold;
}

.footer{

    margin-top:40px;
    text-align:center;
    color:#666;
}

</style>

</head>

<body>

<div class="encabezado">

    <img
    src="logo-2.png"
    class="logo"
    >

    <h1>N&N TECH STORE</h1>

    <p>
        Tecnología | Hardware | Software
    </p>

</div>

<div class="info">

    <p>
        <strong>Cliente:</strong>
        {{CLIENTE}}
    </p>

    <p>
        <strong>Fecha:</strong>
        {{FECHA}}
    </p>

</div>

<table>

<thead>

<tr>

    <th>Producto</th>
    <th>Cantidad</th>
    <th>Precio</th>
    <th>Subtotal</th>

</tr>

</thead>

<tbody>

{{PRODUCTOS}}

</tbody>

</table>

<div class="total">

TOTAL:
$ {{TOTAL}}

</div>

<div class="footer">

Gracias por confiar en N&N Tech

<br>

soporte@nntech.com

</div>

</body>

</html>
